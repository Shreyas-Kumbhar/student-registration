<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>Student Registration Form</h2>

<form th:action="@{/submit}" th:object="${student}" method="post">

    <label>Name:</label>
    <input type="text" th:field="*{name}" required>
    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
    <br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required>
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    <br><br>

    <label>Course:</label>
    <select th:field="*{course}">
        <option value="Java">Java</option>
        <option value="Python">Python</option>
        <option value="Spring">Spring</option>
    </select>
    <p th:if="${#fields.hasErrors('course')}" th:errors="*{course}"></p>
    <br><br>

    <label>Age:</label>
    <input type="number" th:field="*{age}" required>
    <p th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></p>
    <br><br>

    <button type="submit">Register</button>

</form>

</body>
</html>
